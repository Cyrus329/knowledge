<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>专升本知识点速记</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css?v=20260616-kp-8">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">专升本 · 计算机</p>
      <h1>知识点记忆库</h1>
      <p class="subtitle">按顺序刷知识点，图文查看 + 理解讲解 + 新增第一章资料少文件版。</p>
    </div>
    <button id="installBtn" class="ghost hidden">安装到手机</button>
  </header>

  <section class="stats" aria-label="学习统计">
    <div><strong id="totalCount">0</strong><span>知识图</span></div>
    <div><strong id="readCount">0</strong><span>已看</span></div>
    <div><strong id="starCount">0</strong><span>重点</span></div>
    <div><strong id="masteredCount">0</strong><span>已掌握</span></div>
  </section>

  <section class="toolbar">
    <input id="searchInput" type="search" placeholder="搜索知识点、章节、关键词">
    <select id="chapterFilter"><option value="">全部章节</option></select>
    <select id="statusFilter">
      <option value="">全部状态</option>
      <option value="unread">未看</option>
      <option value="read">已看</option>
      <option value="starred">重点</option>
      <option value="mastered">已掌握</option>
    </select>
    <button id="textModeToggle" class="mode-toggle" type="button">背诵模式</button>
  </section>

  <main class="layout">
    <aside class="list-panel">
      <div id="itemList" class="item-list"></div>
    </aside>
    <article id="detail" class="detail-panel empty">
      <p>选择左侧知识点开始查看。</p>
    </article>
  </main>

  <section class="actions">
    <button id="exportBtn">导出学习记录</button>
    <label class="file-label">导入学习记录<input id="importInput" type="file" accept="application/json"></label>
  </section>

  <dialog id="imageDialog" class="image-dialog">
    <button id="closeDialog" class="close-btn">关闭</button>
    <img id="dialogImage" alt="放大的知识导图">
  </dialog>

  <script src="./knowledge-data.js?v=20260616-kp-8"></script>
  <script src="./app.js?v=20260616-kp-8"></script>
</body>
</html>
