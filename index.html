<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>专升本知识点速记本 · v18手机修复版</title>
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="logo">升</span>
    <div>
      <p>计算机 + 英语 + 考点必背 · 清爽填空 + 25分钟专注 + 抗遗忘</p>
      <h1>专升本知识点速记本</h1>
    </div>
  </div>
  <div class="top-actions">
    <button id="themeBtn" class="ghost">夜间</button>
    <button id="installBtn" class="ghost hidden">安装</button>
  </div>
</header>

<section class="dashboard">
  <div class="stat-card"><span>总卡片</span><b id="totalCount">0</b><em id="shownCount">0 个正在显示</em></div>
  <div class="stat-card"><span>计算机进度</span><b id="compPct">0%</b><div class="bar"><i id="compBar"></i></div></div>
  <div class="stat-card"><span>英语进度</span><b id="engPct">0%</b><div class="bar"><i id="engBar"></i></div></div>
  <div class="stat-card"><span>学习时长</span><b id="timeTotal">0m</b><em>今日 <span id="timeToday">0m</span></em></div>
  <div class="stat-card"><span>打卡</span><b id="streak">0 天</b><button id="checkinBtn">今日打卡</button></div>
  <div class="stat-card timer-card">
    <span>25分钟专注</span>
    <b id="focusTimer">25:00</b>
    <em>已完成 <span id="focusCount">0</span> 轮</em>
    <div class="timer-actions">
      <button id="timerStart">开始</button>
      <button id="timerPause" class="ghost">暂停</button>
      <button id="timerReset" class="ghost">重置</button>
    </div>
  </div>
  <div class="stat-card"><span>抗遗忘复习</span><b id="reviewDue">0 张</b><em>按 1/2/4/7/15/30 天复习</em></div>
</section>

<section class="today">
  <div><h2>今日任务</h2><p>默认给你排计算机 + 英语，优先未掌握、未看的卡。</p></div>
  <div id="todayTasks" class="task-list"></div>
</section>

<section class="review-panel">
  <div>
    <h2>抗遗忘复习</h2>
    <p>按遗忘曲线安排：第1天、第2天、第4天、第7天、第15天、第30天复习。点“加入抗遗忘”后会自动排期。</p>
  </div>
  <div class="review-tools">
    <button id="reviewTodayBtn">查看今日复习</button>
    <button id="reviewAllBtn" class="ghost">查看全部抗遗忘</button>
  </div>
  <div id="reviewList" class="review-list"></div>
</section>

<div class="layout">
  <aside class="sidebar">
    <div class="subject-tabs" id="subjectTabs">
      <button data-subject="" class="active">全部</button>
      <button data-subject="计算机">计算机</button>
      <button data-subject="英语">英语</button>
      <button data-subject="考点必背">考点必背</button>
    </div>
    <input id="searchInput" class="search" placeholder="搜：冠词 / 情态动词 / ASCII / RAM / 黄色字..." />
    <div class="mode-box">
      <label><input type="checkbox" id="hideMastered" /> 隐藏已掌握</label>
      <label><input type="checkbox" id="detailMode" checked /> 详细学习模式</label>
    </div>
    <select id="chapterFilter"><option value="">全部章节</option></select>
    <select id="statusFilter"><option value="">全部状态</option><option value="unread">未看</option><option value="read">已看</option><option value="starred">重点</option><option value="mastered">已掌握</option></select>
    <nav class="tree" id="treeNav"></nav>
    <div class="io-box">
      <button id="exportBtn">导出记录</button>
      <label class="import">导入记录<input id="importInput" type="file" accept="application/json"></label>
    </div>
  </aside>

  <main class="main">
    <section class="list" id="itemList"></section>
    <section class="detail" id="detailPane"><div class="empty">点一个知识点开始。</div></section>
  </main>
</div>

<dialog id="imageDialog"><button id="closeDialog">×</button><img id="dialogImage" alt="页面预览"></dialog>

<script src="./knowledge-data.js"></script>
<script src="./app.js"></script>
</body>
</html>
